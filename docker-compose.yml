services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listings
      POSTGRES_PASSWORD: listings
      POSTGRES_DB: listings
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listings -d listings"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgres://listings:listings@db:5432/listings?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        # Wait until Postgres is actually accepting connections, not just started.
        condition: service_healthy

volumes:
  dbdata:
